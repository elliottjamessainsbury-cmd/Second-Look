<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Second Look</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=26" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <h1>
            <span>Second</span>
            <span class="hero-indent">Look</span>
          </h1>
          <p class="hero-text">
            Search for a film you already love. Find perfectly-curated, AI and human-powered recommendations that you'll love. Stop streaming slop, start watching films.
       
          </p>
        </div>

        <aside class="hero-panel">
          <blockquote id="rotating-film-quote" class="rotating-film-quote" aria-live="polite"></blockquote>
        </aside>
      </header>

      <main class="layout">
        <section class="controls card">
          <div class="section-heading">
            <h2>Search films</h2>
            <p>Search a film to see recommendations.</p>
          </div>

          <div class="search-area">
            <label class="field-label" for="movie-search"></label>
            <div class="search-row">
              <input
                id="movie-search"
                type="text"
                autocomplete="off"
                placeholder="Enter film name..."
              />
              <button id="add-first-match" class="ghost-button" type="button">
                Search
              </button>
            </div>
            <div id="search-results" class="search-results" aria-live="polite"></div>
          </div>

          <div class="director-area">
            <div class="field-label-row">
              <span class="field-label">Quick picks</span>
              <button id="reset-director" class="text-button" type="button">Reset</button>
            </div>
            <div id="director-list" class="director-list"></div>
          </div>

        </section>

        <section class="results card">
          <div class="results-head">
            <div>
              <h2 id="results-title">Your next watch starts here</h2>
            </div>
          </div>

          <div id="results-grid" class="results-grid"></div>
          <div id="criterion-section" class="criterion-section"></div>
        </section>
      </main>
    </div>

    <script src="./app.js?v=25"></script>
  </body>
</html>
